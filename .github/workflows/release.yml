name: release
# Cuts a release when you push a tag like v1.0.0.
# Builds the NodeMCU bin, packs the tarball, writes+commits manifest.txt,
# and publishes the GitHub Release. Mirrors release.sh.
on:
  push:
    tags: ["v*"]
permissions:
  contents: write   # needed to commit manifest.txt and create the release
jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          
      - name: Install arduino-cli + ESP8266 core
        run: |
          curl -fsSL https://raw.githubusercontent.com/arduino/arduino-cli/master/install.sh | sh
          echo "$PWD/bin" >> "$GITHUB_PATH"
          ./bin/arduino-cli config init
          ./bin/arduino-cli config add board_manager.additional_urls \
            https://arduino.esp8266.com/stable/package_esp8266com_index.json
          ./bin/arduino-cli core update-index
          ./bin/arduino-cli core install esp8266:esp8266
          
      - name: Build firmware
        run: |
          mkdir -p coin_nodemcu build hotspot/firmware
          cp hotspot/nodemcucodeholder coin_nodemcu/coin_nodemcu.ino
          arduino-cli compile \
            --fqbn "esp8266:esp8266:nodemcuv2:eesz=4M2M,xtal=80" \
            --output-dir build coin_nodemcu
          cp build/coin_nodemcu.ino.bin hotspot/firmware/coin_nodemcu.bin
          
      - name: Pack, manifest, commit, release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VER="${GITHUB_REF_NAME#v}"
          REPO="${GITHUB_REPOSITORY}"
          FW=$(sed -n 's/.*#define[[:space:]]\+FW_VERSION[[:space:]]\+"\([^"]*\)".*/\1/p' hotspot/nodemcucodeholder)
          mkdir -p dist
          TAR="dist/lmepisowifi-$VER.tar.gz"
          tar -czf "$TAR" hotspot www2 lmehspt.sh ota.sh defaults.env
          SHA=$(sha256sum "$TAR" | awk '{print $1}')
          MD5=$(md5sum hotspot/firmware/coin_nodemcu.bin | awk '{print $1}')
          {
            echo "version=$VER"
            echo "url=https://github.com/$REPO/releases/download/v$VER/lmepisowifi-$VER.tar.gz"
            echo "sha256=$SHA"
            echo "notes=Release $VER"
            echo "nodemcu_version=$FW"
            echo "nodemcu_md5=$MD5"
          } > manifest.txt
          git config user.name  github-actions
          git config user.email github-actions@github.com
          git add manifest.txt hotspot/firmware/coin_nodemcu.bin
          git commit -m "release $VER (nodemcu fw $FW)" || echo "nothing to commit"
          git push origin HEAD:main
          gh release create "v$VER" "$TAR" --title "v$VER" --notes "Release $VER"
          
      - name: Purge jsDelivr cache
        run: |
          echo "Purging CHANGELOG.md..."
          curl -sL https://purge.jsdelivr.net/gh/lmepisowifi/lmepisowifi@main/CHANGELOG.md
          echo -e "\nPurging manifest.txt..."
          curl -sL https://purge.jsdelivr.net/gh/lmepisowifi/lmepisowifi@main/manifest.txt
