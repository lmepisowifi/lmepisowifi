<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="/css/bootstrap.min.css?v=1.0.0" rel="stylesheet">
    <link href="/css/toastr.min.css?v=1.0.0" rel="stylesheet">
    <link href="/css/style.css?v=1.0.0" rel="stylesheet">
</head>
<body>
    <div id="overlay">
        <div id="overlay-blur"></div>
        <div id="overlay-msg">
            <div id="overlay-spinner"></div>
            <span id="overlay-text"></span>
        </div>
    </div>

    <script src="/js/nav.js?v=1.0.0"></script>

    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-6 col-lg-4">
                <div class="card">
                    <div class="card-header">Client Access Limit</div>
                    <div class="card-body">
                        <div class="mb-1">
                            <label for="maxsta" class="form-label">Maximum Connected Clients</label>
                            <input type="number" class="form-control" id="maxsta"
                                   min="0" max="64" placeholder="0–64">
                        </div>
                        <div class="mb-3" style="font-size:11px; color:var(--text-secondary); margin-top:5px;">
                            Set to <strong style="color:var(--text-primary)">0</strong> for unlimited.
                            Maximum is <strong style="color:var(--text-primary)">64</strong>.
                        </div>
                        <button type="button" class="btn btn-primary w-100"
                                id="save-btn" onclick="saveLimit()">Save</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const input   = document.getElementById('maxsta');
        const saveBtn = document.getElementById('save-btn');
        const overlay    = document.getElementById('overlay');
        const overlayTxt = document.getElementById('overlay-text');
        const spinner    = document.getElementById('overlay-spinner');

        function lockForm()   { input.disabled = true;  saveBtn.disabled = true;  }
        function unlockForm() { input.disabled = false; saveBtn.disabled = false; }

        function showOverlay(text) {
            overlayTxt.textContent = text;
            spinner.style.display = 'block';
            overlay.classList.add('visible');
        }

        function hideOverlay() {
            overlay.classList.remove('visible');
            setTimeout(unlockForm, 350);
        }

        function pollUntilSaved(expected, retries) {
            retries = (retries === undefined) ? 15 : retries;
            fetch('/cgi-bin/lme.cgi?action=devicelimit')
                .then(r => r.json())
                .then(data => {
                    if (data.maxsta !== expected) throw new Error('not yet');
                    spinner.style.display = 'none';
                    overlayTxt.textContent = 'Changes Applied.';
                    setTimeout(hideOverlay, 1200);
                })
                .catch(() => {
                    if (retries > 0) {
                        setTimeout(() => pollUntilSaved(expected, retries - 1), 2000);
                    } else {
                        toastr["warning"](" ", "the")                    
                    }
                });
        }

        function saveLimit() {
            const raw = input.value.trim();
            const val = parseInt(raw, 10);

            if (raw === '' || isNaN(val) || val < 0 || val > 64) {
                input.focus();
                return;
            }

            lockForm();
            showOverlay('Applying Changes.');

            fetch('/cgi-bin/lme.cgi?action=devicelimit', {
                method: 'POST',
                headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                body: 'maxsta=' + val
            }).catch(() => {});

            setTimeout(() => pollUntilSaved(val), 2000);
        }

        // Allow Enter key to save
        input.addEventListener('keydown', e => {
            if (e.key === 'Enter') saveLimit();
        });

        // -------------------------------------------------------
        // Init: load current limit on page load
        // -------------------------------------------------------
        window.addEventListener('DOMContentLoaded', () => {
            lockForm();
            showOverlay('Loading…');

            fetch('/cgi-bin/lme.cgi?action=devicelimit')
                .then(r => r.json())
                .then(data => {
                    input.value = data.maxsta;
                    hideOverlay();
                })
                .catch(() => {
                    overlay.classList.remove('visible');
                    toastr["warning"](" ", "error")                
                });
        });
    </script>
    <script src="/js/jquery-3.7.1.min.js?v=1.0.0"></script>
    <script src="/js/bootstrap.bundle.min.js?v=1.0.0"></script>
    <script src="/js/toastr.min.js?v=1.0.0"></script>
    
</body>
</html>
