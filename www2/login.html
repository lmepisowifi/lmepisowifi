<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="/css/bootstrap.min.css?v=1.0.0" rel="stylesheet">
    <link href="/css/style.css?v=1.0.0" rel="stylesheet">
    <link href="/css/toastr.min.css?v=1.0.0" rel="stylesheet">
    <script src="/js/jquery-3.7.1.min.js?v=1.0.0"></script>
    <script src="/js/toastr.min.js?v=1.0.0"></script>
    <!-- Removed the inline <style> block, as style.css handles everything now -->
</head>
<body>
    <div id="overlay" class="visible">
        <div id="overlay-blur"></div>
        <div id="overlay-msg">
            <div id="overlay-spinner"></div>
            <span id="overlay-text">Loading…</span>
        </div>
    </div>

    <!-- We replaced the <main> tag with your custom .login-wrap and .login-box -->
<div class="login-wrap">
    <div class="d-flex flex-column align-items-center">
        
        <img src="/img/logo.png?v=1.0.0" alt="Logo" class="login-logo">

        <div class="login-box">
            <form action="/cgi-bin/auth.cgi" method="POST">
                <div class="login-title">The modded web interface<br>| M2-2050-G40</div>
                
                <div class="alert alert-danger d-none" id="error-msg">Invalid username or password.</div>
                <div class="alert alert-warning d-none" id="lockout-msg"></div>
                
                <div class="mb-2">
                    <input type="text" class="form-control form-control-sm" name="username" id="username" placeholder="Username" required>
                </div>
                <div class="mb-3">
                    <input type="password" class="form-control form-control-sm" name="password" id="password" placeholder="Password" required>
                </div>
                
                <button class="btn btn-primary w-100 py-2 mt-2" type="submit" id="login-btn">Log In</button>
            </form>
        </div>
    </div>
</div>


    <script>
        var overlay    = document.getElementById('overlay');
        var overlayTxt = document.getElementById('overlay-text');

        // ── Login lockout ──────────────────────────────────────
        // All attempt-counting and lockout state lives server-side now
        // (see /cgi-bin/auth.cgi + /cgi-bin/check_lockout.cgi). Nothing is
        // tracked in this browser, so there's nothing here to fall out of
        // sync after a successful login or a lockout triggered elsewhere —
        // this page just displays whatever the server reports.

        var form       = document.querySelector('form');
        var loginBtn   = document.getElementById('login-btn');
        var lockoutMsg = document.getElementById('lockout-msg');
        var userInput  = document.getElementById('username');
        var passInput  = document.getElementById('password');
        var lockTimer  = null;
        var isLocked   = false;

        function lockForm(secsLeft) {
            isLocked = true;
            loginBtn.disabled = true;
            if (userInput) userInput.disabled = true;
            if (passInput) passInput.disabled = true;
            if (lockTimer) clearInterval(lockTimer);
            lockoutMsg.classList.remove('d-none');
            var tick = function () {
                lockoutMsg.textContent =
                    'Too many failed attempts (from any device). Try again in ' + secsLeft + 's.';
                if (secsLeft <= 0) {
                    clearInterval(lockTimer);
                    unlockForm();
                    return;
                }
                secsLeft -= 1;
            };
            tick();
            lockTimer = setInterval(tick, 1000);
        }

        function unlockForm() {
            isLocked = false;
            if (lockTimer) { clearInterval(lockTimer); lockTimer = null; }
            loginBtn.disabled = false;
            if (userInput) userInput.disabled = false;
            if (passInput) passInput.disabled = false;
            lockoutMsg.classList.add('d-none');
        }

        // Ask the server what the current state actually is. Used on a
        // fresh page load with no query string (e.g. someone else's failed
        // attempts already tripped the lockout, or a prior lockout is
        // still counting down).
        function refreshLockoutState() {
            fetch('/cgi-bin/check_lockout.cgi')
                .then(function (r) { return r.text(); })
                .then(function (txt) {
                    var parts = txt.trim().split(' ');
                    if (parts[0] === 'locked') {
                        lockForm(parseInt(parts[1], 10) || 60);
                    }
                })
                .catch(function () {});
        }

        // Reflect the outcome of the POST we just redirected from, if any.
        var params = new URLSearchParams(window.location.search);
        if (params.get('locked') === '1') {
            lockForm(parseInt(params.get('secs'), 10) || 60);
        } else if (params.get('error') === '1') {
            document.getElementById('error-msg').classList.remove('d-none');
            var remaining = parseInt(params.get('remaining'), 10);
            if (!isNaN(remaining)) {
                toastr.warning(remaining + ' attempt' + (remaining === 1 ? '' : 's') +
                               ' remaining before lockout.');
            }
        } else {
            refreshLockoutState();
        }

        toastr.warning("the modded web interface is still in beta, expect bugs and glitches to occur.")

        // Check if already logged in; hide loader once we know either way
        fetch('/cgi-bin/check_auth.cgi')
            .then(function (r) { return r.text(); })
            .then(function (status) {
                if (status.trim() === 'authenticated') {
                    overlayTxt.textContent = 'Redirecting…';
                    window.location.href = '/index.html';
                } else {
                    overlay.classList.remove('visible');
                }
            })
            .catch(function () {
                overlay.classList.remove('visible');
            });

        // Show overlay on form submit. The server is the sole authority on
        // lockout (auth.cgi checks it before looking at credentials at
        // all), so this is just UX — it stops an obviously-locked form from
        // submitting, but isn't what actually enforces the lockout.
        form.addEventListener('submit', function (e) {
            if (isLocked) {
                e.preventDefault();
                return;
            }
            overlayTxt.textContent = 'Logging in…';
            overlay.classList.add('visible');
        });
    </script>
</body>
</html>
