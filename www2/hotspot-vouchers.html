<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="/css/bootstrap.min.css?v=1.0.0" rel="stylesheet">
    <link href="/css/style.css?v=1.0.0" rel="stylesheet">
    <link href="/css/toastr.min.css?v=1.0.0" rel="stylesheet">
    <style>
        .field-hint { font-size:11.5px; color:var(--text-secondary); margin-top:3px; }
        .empty-state { color:var(--text-secondary); font-size:13px; text-align:center; padding:28px 0; }

        /* ── Voucher cards ─────────────────────────────────────── */
        .voucher-grid {
            display:grid; grid-template-columns:repeat(auto-fill,minmax(195px,1fr)); gap:10px; padding:12px;
        }
        .voucher-card {
            background:var(--bg-input); border:1px solid var(--border-color);
            border-radius:8px; padding:13px 14px; position:relative;
        }
        .voucher-code { font-size:15px; font-weight:700; letter-spacing:.1em; font-family:monospace; }
        .voucher-meta { font-size:12px; color:var(--text-secondary); margin-top:4px; line-height:1.5; }
        .voucher-tag  {
            display:inline-block; padding:1px 7px; border-radius:3px; font-size:10px;
            font-weight:700; margin-top:5px; background:rgba(255,255,255,.08); color:#aaa;
        }

        /* ── Quick generate panel ──────────────────────────────── */
        .gen-row { display:flex; gap:8px; flex-wrap:wrap; margin-top:8px; }
        .gen-preset {
            padding:5px 13px; border:1px solid var(--border-color); border-radius:5px;
            background:var(--bg-input); color:var(--text-secondary); font-size:12px;
            cursor:pointer; transition:border-color .15s, color .15s;
        }
        .gen-preset:hover { border-color:#888; color:var(--text-primary); }
    </style>
</head>
<body>

<div id="overlay">
    <div id="overlay-blur"></div>
    <div id="overlay-msg">
        <div id="overlay-spinner"></div>
        <span id="overlay-text"></span>
    </div>
</div>

<script src="/js/nav.js?v=1.0.0"></script>

<div class="container mt-4" style="max-width:860px;">

    <!-- ── Add voucher ─────────────────────────────────────────── -->
    <div class="card mb-3">
        <div class="card-header">Add Voucher</div>
        <div class="card-body">
            <div class="row g-3 align-items-end">
                <div class="col-sm-5">
                    <label class="form-label">Voucher Code</label>
                    <input type="text" class="form-control text-uppercase" id="v-code"
                           placeholder="e.g. WIFI1234" maxlength="20" autocomplete="off">
                </div>
                <div class="col-sm-4">
                    <label class="form-label">Duration <span class="field-hint d-inline">(minutes)</span></label>
                    <input type="number" class="form-control" id="v-duration" placeholder="60" min="1">
                </div>
                <div class="col-sm-3 d-flex align-items-end">
                    <button class="btn btn-primary w-100" onclick="addVoucher()">Add</button>
                </div>
            </div>

            <!-- Quick Generate -->
            <div class="mt-3" style="border-top:1px solid var(--border-color); padding-top:12px;">
                <div style="font-size:12px;color:var(--text-secondary);margin-bottom:4px;">Quick Generate</div>
                <div class="gen-row">
                    <button class="gen-preset" onclick="quickGen(15)">15 min</button>
                    <button class="gen-preset" onclick="quickGen(30)">30 min</button>
                    <button class="gen-preset" onclick="quickGen(60)">1 hour</button>
                    <button class="gen-preset" onclick="quickGen(120)">2 hours</button>
                    <button class="gen-preset" onclick="quickGen(240)">4 hours</button>
                    <button class="gen-preset" onclick="quickGen(1440)">1 day</button>
                    <button class="gen-preset" onclick="quickGen(10080)">1 week</button>
                </div>
                <div class="field-hint mt-2">Generates a random 8-character code with the selected duration.</div>
            </div>
        </div>
    </div>

    <!-- ── Voucher list ─────────────────────────────────────────── -->
    <div class="card">
        <div class="card-header d-flex align-items-center justify-content-between">
            <span>Vouchers</span>
            <div class="d-flex gap-2">
                <span id="voucher-count" style="font-size:12px;color:var(--text-secondary);"></span>
                <button class="btn btn-sm btn-outline-secondary" onclick="loadVouchers()">Refresh</button>
            </div>
        </div>
        <div id="vouchers-wrap">
            <div class="empty-state" id="vouchers-empty">Loading…</div>
            <div class="voucher-grid" id="voucher-cards" style="display:none;"></div>
        </div>
    </div>

</div>

<script src="/js/bootstrap.bundle.min.js?v=1.0.0"></script>
<script src="/js/jquery-3.7.1.min.js?v=1.0.0"></script>
<script src="/js/toastr.min.js?v=1.0.0"></script>
<script>
toastr.options = { positionClass:'toast-bottom-right', timeOut:3000, progressBar:true, closeButton:true };
function showOverlay(m){ document.getElementById('overlay-text').textContent=m||''; document.getElementById('overlay').style.display='flex'; }
function hideOverlay(){ document.getElementById('overlay').style.display='none'; }

function loadVouchers(){
    var empty = document.getElementById('vouchers-empty');
    var cards = document.getElementById('voucher-cards');
    var cnt   = document.getElementById('voucher-count');
    empty.textContent='Loading…'; empty.style.display='block'; cards.style.display='none';
    fetch('/cgi-bin/hotspot.cgi?action=vouchers_get', { cache:'no-store' })
        .then(function(r){ return r.json(); })
        .then(function(d){
            if (!d.ok||!d.vouchers.length){
                empty.textContent='No vouchers'; empty.style.display='block'; cards.style.display='none'; cnt.textContent=''; return;
            }
            cnt.textContent = d.vouchers.length + ' voucher'+(d.vouchers.length>1?'s':'');
            cards.innerHTML='';
            d.vouchers.forEach(function(v){
                var durMin = Math.round(v.duration/60);
                var durStr = durMin>=1440 ? (Math.round(durMin/1440)+'d') : durMin>=60 ? (Math.round(durMin/60)+'h') : durMin+'m';
                var card=document.createElement('div');
                card.className='voucher-card';
                card.innerHTML=
                    '<div class="voucher-code">'+escHtml(v.code)+'</div>'+
                    '<div class="voucher-meta">'+durStr+' access</div>'+
                    '<button class="btn btn-sm btn-outline-danger mt-2 w-100" onclick="delVoucher(\''+escAttr(v.code)+'\',this)">Delete</button>';
                cards.appendChild(card);
            });
            empty.style.display='none'; cards.style.display='grid';
        })
        .catch(function(){ empty.textContent='Failed to load vouchers'; });
}

function addVoucher(){
    var code   = document.getElementById('v-code').value.trim().toUpperCase();
    var durMin = parseInt(document.getElementById('v-duration').value);
    if (!code){ toastr.warning('Enter a voucher code'); return; }
    if (!durMin||durMin<1){ toastr.warning('Enter a valid duration (minutes)'); return; }
    fetch('/cgi-bin/hotspot.cgi?action=voucher_add',{method:'POST',headers:{'Content-Type':'application/x-www-form-urlencoded'},
          body:'code='+encodeURIComponent(code)+'&duration='+(durMin*60)})
    .then(function(r){ return r.json(); })
    .then(function(d){
        if (d.ok){
            toastr.success('Voucher '+code+' added');
            document.getElementById('v-code').value='';
            document.getElementById('v-duration').value='';
            loadVouchers();
        } else { toastr.error('Add failed: '+(d.error||'')); }
    })
    .catch(function(){ toastr.error('Network error'); });
}

function quickGen(mins){
    var chars='ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
    var code='';
    for (var i=0;i<8;i++) code+=chars[Math.floor(Math.random()*chars.length)];
    document.getElementById('v-code').value=code;
    document.getElementById('v-duration').value=mins;
    addVoucher();
}

function delVoucher(code, btn){
    if (!confirm('Delete voucher '+code+'?')) return;
    btn.disabled=true; btn.textContent='…';
    fetch('/cgi-bin/hotspot.cgi?action=voucher_del',{method:'POST',headers:{'Content-Type':'application/x-www-form-urlencoded'},body:'code='+encodeURIComponent(code)})
    .then(function(r){ return r.json(); })
    .then(function(d){
        if (d.ok){ toastr.success('Deleted '+code); loadVouchers(); }
        else { toastr.error('Delete failed'); btn.disabled=false; btn.textContent='Delete'; }
    })
    .catch(function(){ toastr.error('Network error'); btn.disabled=false; btn.textContent='Delete'; });
}

function escHtml(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function escAttr(s){ return String(s).replace(/'/g,'&#39;').replace(/"/g,'&quot;'); }

window.addEventListener('DOMContentLoaded', loadVouchers);
</script>
</body>
</html>
