<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="/css/bootstrap.min.css?v=1.0.0" rel="stylesheet">
    <link href="/css/style.css?v=1.0.0" rel="stylesheet">
    <link href="/css/toastr.min.css?v=1.0.0" rel="stylesheet">

    <style>
        .lan-toggle {
            width: 50px;
            height: 28px;
            border-radius: 14px;
            background: #555;
            position: relative;
            cursor: pointer;
            transition: background 0.25s;
            flex-shrink: 0;
        }
        .lan-toggle.on { background: #ffffff; }
        .lan-toggle.disabled-ui { opacity: 0.45; pointer-events: none; }
        .lan-toggle-knob {
            position: absolute;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: #fff;
            top: 4px;
            left: 4px;
            transition: left 0.25s, background 0.25s, box-shadow 0.25s;
            box-shadow: 0 1px 4px rgba(0,0,0,0.5);
        }
        .lan-toggle.on .lan-toggle-knob {
            left: 26px;
            background: #555;
            box-shadow: 0 1px 4px rgba(0,0,0,0.3);
        }
    </style>
</head>
<body>
    <div id="overlay">
        <div id="overlay-blur"></div>
        <div id="overlay-msg">
            <div id="overlay-spinner"></div>
            <span id="overlay-text"></span>
        </div>
    </div>

    <script>document.write('<script src="/js/nav.js?t=' + Date.now() + '"><\/script>');</script>

    <div class="container mt-5">
        <div class="row justify-content-center g-4">

            <!-- LAN IP Configuration card -->
            <div class="col-md-10">
                <div class="card">
                    <div class="card-header">LAN IP Configuration</div>
                    <div class="card-body">
                        <div class="row g-3">
                            <div class="col-md-6">
                                <label for="lan-ip" class="form-label">IP Address</label>
                                <input type="text" class="form-control" id="lan-ip"
                                       maxlength="15" autocomplete="off"
                                       placeholder="e.g. 192.168.69.1">
                                <div class="invalid-feedback" id="lan-ip-err" style="display:none"></div>
                            </div>
                            <div class="col-md-6">
                                <label for="lan-subnet" class="form-label">Subnet Mask</label>
                                <input type="text" class="form-control" id="lan-subnet"
                                       maxlength="15" autocomplete="off"
                                       placeholder="e.g. 255.255.255.0">
                                <div class="invalid-feedback" id="lan-subnet-err" style="display:none"></div>
                            </div>
                        </div>
                        <button type="button" class="btn btn-primary w-100 mt-3"
                                id="lan-ip-save-btn" onclick="saveLanIp()">Save</button>
                    </div>
                </div>
            </div>

            <!-- DHCP Server card -->
            <div class="col-md-10">
                <div class="card">
                    <div class="card-header d-flex align-items-center justify-content-between">
                        <span>DHCP Server</span>
                        <div id="dhcp-toggle" class="lan-toggle" onclick="toggleDhcp()"
                             role="switch" aria-checked="false" title="Enable / Disable DHCP server">
                            <div class="lan-toggle-knob"></div>
                        </div>
                    </div>
                    <div class="card-body">
                        <div class="row g-3">
                            <div class="col-md-6">
                                <label for="dhcp-pool-start" class="form-label">Pool Start</label>
                                <input type="text" class="form-control" id="dhcp-pool-start"
                                       maxlength="15" autocomplete="off"
                                       placeholder="e.g. 192.168.1.100">
                                <div class="invalid-feedback" id="dhcp-pool-start-err" style="display:none"></div>
                            </div>
                            <div class="col-md-6">
                                <label for="dhcp-pool-end" class="form-label">Pool End</label>
                                <input type="text" class="form-control" id="dhcp-pool-end"
                                       maxlength="15" autocomplete="off"
                                       placeholder="e.g. 192.168.1.200">
                                <div class="invalid-feedback" id="dhcp-pool-end-err" style="display:none"></div>
                            </div>
                            <div class="col-md-6">
                                <label for="dhcp-mask" class="form-label">Subnet Mask</label>
                                <input type="text" class="form-control" id="dhcp-mask"
                                       maxlength="15" autocomplete="off"
                                       placeholder="e.g. 255.255.255.0">
                                <div class="invalid-feedback" id="dhcp-mask-err" style="display:none"></div>
                            </div>
                            <div class="col-md-6">
                                <label for="dhcp-gateway" class="form-label">Gateway</label>
                                <input type="text" class="form-control" id="dhcp-gateway"
                                       maxlength="15" autocomplete="off"
                                       placeholder="e.g. 192.168.1.1">
                                <div class="invalid-feedback" id="dhcp-gateway-err" style="display:none"></div>
                            </div>
                            <div class="col-md-6">
                                <label for="dhcp-lease" class="form-label">Lease Time (seconds)</label>
                                <input type="number" class="form-control" id="dhcp-lease"
                                       min="1" autocomplete="off" placeholder="e.g. 86400">
                                <div class="invalid-feedback" id="dhcp-lease-err" style="display:none"></div>
                            </div>
                            <div class="col-md-6">
                                <label for="dhcp-domain" class="form-label">Domain</label>
                                <input type="text" class="form-control" id="dhcp-domain"
                                       maxlength="63" autocomplete="off" placeholder="e.g. bbrouter">
                                <div class="invalid-feedback" id="dhcp-domain-err" style="display:none"></div>
                            </div>
                            <div class="col-md-12">
                                <div class="form-check">
                                    <input class="form-check-input" type="checkbox" id="dhcp-dns-opt">
                                    <label class="form-check-label" for="dhcp-dns-opt">
                                        Use custom DNS servers (unchecked: hand out this router's own IP)
                                    </label>
                                </div>
                            </div>
                            <div class="col-md-4">
                                <label for="dhcp-dns1" class="form-label">DNS 1</label>
                                <input type="text" class="form-control" id="dhcp-dns1"
                                       maxlength="15" autocomplete="off" placeholder="optional">
                                <div class="invalid-feedback" id="dhcp-dns1-err" style="display:none"></div>
                            </div>
                            <div class="col-md-4">
                                <label for="dhcp-dns2" class="form-label">DNS 2</label>
                                <input type="text" class="form-control" id="dhcp-dns2"
                                       maxlength="15" autocomplete="off" placeholder="optional">
                                <div class="invalid-feedback" id="dhcp-dns2-err" style="display:none"></div>
                            </div>
                            <div class="col-md-4">
                                <label for="dhcp-dns3" class="form-label">DNS 3</label>
                                <input type="text" class="form-control" id="dhcp-dns3"
                                       maxlength="15" autocomplete="off" placeholder="optional">
                                <div class="invalid-feedback" id="dhcp-dns3-err" style="display:none"></div>
                            </div>
                        </div>
                        <button type="button" class="btn btn-primary w-100 mt-3"
                                id="dhcp-save-btn" onclick="saveDhcp()">Save</button>
                    </div>
                </div>
            </div>

            <!-- LAN 1 card -->
            <div class="col-md-5">
                <div class="card">
                    <div class="card-header d-flex align-items-center justify-content-between">
                        <span>eth0.2.0 <span class="text-secondary" style="font-size:0.85em">(lan1)</span></span>
                        <div id="toggle-1" class="lan-toggle" onclick="localToggle(1)"
                             role="switch" aria-checked="false" title="Enable / Disable port">
                            <div class="lan-toggle-knob"></div>
                        </div>
                    </div>
                    <div class="card-body">
                        <div class="mb-3">
                            <label for="speed-1" class="form-label">Link Speed Negotiation</label>
                            <select class="form-select" id="speed-1" name="speed-1"></select>
                        </div>
                        <button type="button" class="btn btn-primary w-100"
                                id="save-btn-1" onclick="savePort(1)">Save</button>
                    </div>
                </div>
            </div>

            <!-- LAN 2 card -->
            <div class="col-md-5">
                <div class="card">
                    <div class="card-header d-flex align-items-center justify-content-between">
                        <span>eth0.3.0 <span class="text-secondary" style="font-size:0.85em">(lan2)</span></span>
                        <div id="toggle-2" class="lan-toggle" onclick="localToggle(2)"
                             role="switch" aria-checked="false" title="Enable / Disable port">
                            <div class="lan-toggle-knob"></div>
                        </div>
                    </div>
                    <div class="card-body">
                        <div class="mb-3">
                            <label for="speed-2" class="form-label">Link Speed Negotiation</label>
                            <select class="form-select" id="speed-2" name="speed-2"></select>
                        </div>
                        <button type="button" class="btn btn-primary w-100"
                                id="save-btn-2" onclick="savePort(2)">Save</button>
                    </div>
                </div>
            </div>

        </div>
    </div>

    <script>
        const overlay    = document.getElementById('overlay');
        const overlayTxt = document.getElementById('overlay-text');
        const spinner    = document.getElementById('overlay-spinner');

        let countdownTimer = null;
        let secondsLeft    = 90;

        // Track the values loaded from CGI so we can detect changes.
        let loadedLanIp     = '';
        let loadedLanSubnet = '';
        let loadedDhcpEnabled = false;

        // --------------------------------------------------------
        // Speed options
        // --------------------------------------------------------
        const SPEED_OPTIONS = [
            { label: 'Auto Negotiate',        value: 'auto'      },
            { label: '1000 Mbps Full Duplex', value: '1000f'     },
            { label: '100 Mbps Full Duplex',  value: '100f'      },
            { label: '100 Mbps Half Duplex',  value: '100h'      },
            { label: '100 Mbps Full + Half',  value: '100f 100h' },
            { label: '10 Mbps Full Duplex',   value: '10f'       },
            { label: '10 Mbps Half Duplex',   value: '10h'       },
            { label: '10 Mbps Full + Half',   value: '10f 10h'   },
        ];

        function normalizeSpeed(s) {
            if (!s || s.toLowerCase() === 'auto') return 'auto';
            return s.toLowerCase().split(',').map(x => x.trim()).filter(Boolean).join(' ');
        }

        function buildSpeedSelect(portNum, currentSpeed) {
            const sel  = document.getElementById('speed-' + portNum);
            sel.innerHTML = '';
            const norm = normalizeSpeed(currentSpeed);
            let matched = false;
            SPEED_OPTIONS.forEach(opt => {
                const el = document.createElement('option');
                el.value = opt.value;
                el.textContent = opt.label;
                if (opt.value === norm) { el.selected = true; matched = true; }
                sel.appendChild(el);
            });
            if (!matched && currentSpeed) {
                const el = document.createElement('option');
                el.value = norm;
                el.textContent = 'Custom (' + currentSpeed + ')';
                el.selected = true;
                sel.insertBefore(el, sel.firstChild);
            }
        }

        // --------------------------------------------------------
        // Toggle helpers
        // --------------------------------------------------------
        function setToggle(portNum, enabled) {
            const tog = document.getElementById('toggle-' + portNum);
            if (enabled) {
                tog.classList.add('on');
                tog.setAttribute('aria-checked', 'true');
            } else {
                tog.classList.remove('on');
                tog.setAttribute('aria-checked', 'false');
            }
        }

        function lockPort(portNum) {
            document.getElementById('speed-'    + portNum).disabled = true;
            document.getElementById('save-btn-' + portNum).disabled = true;
            document.getElementById('toggle-'   + portNum).classList.add('disabled-ui');
        }

        function unlockPort(portNum) {
            document.getElementById('speed-'    + portNum).disabled = false;
            document.getElementById('save-btn-' + portNum).disabled = false;
            document.getElementById('toggle-'   + portNum).classList.remove('disabled-ui');
        }

        function lockAll()   { lockPort(1); lockPort(2); }
        function unlockAll() { unlockPort(1); unlockPort(2); }

        // --------------------------------------------------------
        // Overlay helpers
        // --------------------------------------------------------
        function showOverlay(text) {
            overlayTxt.textContent = text;
            spinner.style.display = 'block';
            overlay.classList.add('visible');
        }

        function hideOverlay() {
            overlay.classList.remove('visible');
            if (countdownTimer) { clearInterval(countdownTimer); countdownTimer = null; }
            setTimeout(unlockAll, 350);
        }

        function startCountdown() {
            secondsLeft = 90;
            showOverlay('Applying Changes. ' + secondsLeft + 's');
            countdownTimer = setInterval(() => {
                secondsLeft--;
                if (secondsLeft > 0) {
                    overlayTxt.textContent = 'Applying Changes. ' + secondsLeft + 's';
                } else {
                    clearInterval(countdownTimer);
                    countdownTimer = null;
                    overlayTxt.textContent = 'Reverting Changes.';
                }
            }, 1000);
        }

        // --------------------------------------------------------
        // Port polling / status
        // --------------------------------------------------------
        function pollLanStatus(retries) {
            retries = (retries === undefined) ? 15 : retries;
            fetch('/cgi-bin/lme.cgi?action=lan_status')
                .then(r => r.json())
                .then(data => {
                    if (data.error) throw new Error(data.error);
                    applyStatus(data);
                    if (data.pending) {
                        fetch('/cgi-bin/lme.cgi?action=lan_confirm').catch(() => {});
                    }
                    if (countdownTimer) { clearInterval(countdownTimer); countdownTimer = null; }
                    spinner.style.display = 'none';
                    overlayTxt.textContent = 'Changes Applied.';
                    setTimeout(hideOverlay, 1000);
                })
                .catch(() => {
                    if (retries > 0) {
                        setTimeout(() => pollLanStatus(retries - 1), 2000);
                    } else {
                        hideOverlay();
                        toastr['warning']('Network error.', 'Error');
                    }
                });
        }

        function applyStatus(data) {
            setToggle(1, data.port1_pwr === 'enabled');
            setToggle(2, data.port2_pwr === 'enabled');
            buildSpeedSelect(1, data.port1_speed);
            buildSpeedSelect(2, data.port2_speed);
        }

        function localToggle(portNum) {
            const tog = document.getElementById('toggle-' + portNum);
            const isOn = tog.classList.toggle('on');
            tog.setAttribute('aria-checked', isOn ? 'true' : 'false');
        }

        function savePort(portNum) {
            const tog   = document.getElementById('toggle-'   + portNum);
            const sel   = document.getElementById('speed-'    + portNum);
            const power = tog.classList.contains('on') ? 'enable' : 'disable';
            const speed = sel.value;

            lockAll();
            startCountdown();

            const body = 'port=' + portNum
                       + '&power=' + encodeURIComponent(power)
                       + '&speed=' + encodeURIComponent(speed);

            fetch('/cgi-bin/lme.cgi', {
                method: 'POST',
                headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                body: body
            })
            .then(r => {
                if (!r.ok) return r.text().then(t => { throw new Error(t); });
                setTimeout(() => pollLanStatus(), 1500);
            })
            .catch(err => {
                if (countdownTimer) { clearInterval(countdownTimer); countdownTimer = null; }
                hideOverlay();
                toastr['warning']('Error: ' + (err.message || 'unknown'), 'Error');
            });
        }

        // --------------------------------------------------------
        // LAN IP card — validation
        // --------------------------------------------------------
        function setIpFieldError(inputId, errId, msg) {
            const inp = document.getElementById(inputId);
            const err = document.getElementById(errId);
            if (msg) {
                inp.classList.add('is-invalid');
                err.textContent = msg;
                err.style.display = 'block';
            } else {
                inp.classList.remove('is-invalid');
                err.style.display = 'none';
            }
        }

        function validateIpField(val) {
            if (!val) return 'Required';
            const parts = val.split('.');
            if (parts.length !== 4) return 'Must be in dotted-decimal format (e.g. 192.168.1.1)';
            for (const p of parts) {
                if (!/^\d+$/.test(p) || +p < 0 || +p > 255)
                    return 'Each octet must be 0 – 255';
            }
            return null;
        }

        // --------------------------------------------------------
        // LAN IP card — lock / unlock (independent of port card)
        // --------------------------------------------------------
        function lockIpCard() {
            document.getElementById('lan-ip').disabled          = true;
            document.getElementById('lan-subnet').disabled      = true;
            document.getElementById('lan-ip-save-btn').disabled = true;
        }

        function unlockIpCard() {
            document.getElementById('lan-ip').disabled          = false;
            document.getElementById('lan-subnet').disabled      = false;
            document.getElementById('lan-ip-save-btn').disabled = false;
        }

        // --------------------------------------------------------
        // LAN IP card — save
        // --------------------------------------------------------
        function saveLanIp() {
            const ipVal     = document.getElementById('lan-ip').value.trim();
            const subnetVal = document.getElementById('lan-subnet').value.trim();

            const ipErr     = validateIpField(ipVal);
            const subnetErr = validateIpField(subnetVal);
            setIpFieldError('lan-ip',     'lan-ip-err',     ipErr);
            setIpFieldError('lan-subnet', 'lan-subnet-err', subnetErr);
            if (ipErr || subnetErr) return;

            const ipChanged = (ipVal !== loadedLanIp || subnetVal !== loadedLanSubnet);

            lockIpCard();
            lockAll();
            showOverlay('Applying Changes.');

            fetch('/cgi-bin/lme.cgi?action=lan_ip_save', {
                method: 'POST',
                headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                body: 'ip=' + encodeURIComponent(ipVal)
                    + '&subnet=' + encodeURIComponent(subnetVal)
            })
            .then(r => {
                if (!r.ok) return r.text().then(t => { throw new Error(t); });
                return r.json();
            })
            .then(data => {
                loadedLanIp     = ipVal;
                loadedLanSubnet = subnetVal;

                spinner.style.display = 'none';

                if (ipChanged) {
                    // Device IP changed — the browser must navigate to the new address.
                    overlayTxt.innerHTML =
                        'IP address changed to <strong>' + ipVal + '</strong>.<br>'
                        + 'Navigate to <a href="http://' + ipVal + '/lan.html" '
                        + 'style="color:#fff">http://' + ipVal + '/lan.html</a>';
                    // Offer auto-redirect after 4 seconds
                    setTimeout(() => {
                        window.location.href = 'http://' + ipVal + '/lan.html';
                    }, 4000);
                } else {
                    overlayTxt.textContent = 'Changes Applied.';
                    setTimeout(() => {
                        overlay.classList.remove('visible');
                        setTimeout(() => { unlockAll(); unlockIpCard(); }, 350);
                    }, 1000);
                }
            })
            .catch(err => {
                overlay.classList.remove('visible');
                setTimeout(() => { unlockAll(); unlockIpCard(); }, 350);
                toastr['warning']('Error: ' + (err.message || 'unknown'), 'Error');
            });
        }

        // --------------------------------------------------------
        // DHCP Server card — toggle
        // --------------------------------------------------------
        function setDhcpToggle(enabled) {
            const tog = document.getElementById('dhcp-toggle');
            if (enabled) {
                tog.classList.add('on');
                tog.setAttribute('aria-checked', 'true');
            } else {
                tog.classList.remove('on');
                tog.setAttribute('aria-checked', 'false');
            }
        }

        function toggleDhcp() {
            const tog = document.getElementById('dhcp-toggle');
            const isOn = tog.classList.toggle('on');
            tog.setAttribute('aria-checked', isOn ? 'true' : 'false');
        }

        // --------------------------------------------------------
        // DHCP Server card — lock / unlock (independent of other cards)
        // --------------------------------------------------------
        const DHCP_FIELD_IDS = [
            'dhcp-pool-start', 'dhcp-pool-end', 'dhcp-mask', 'dhcp-gateway',
            'dhcp-lease', 'dhcp-domain', 'dhcp-dns-opt',
            'dhcp-dns1', 'dhcp-dns2', 'dhcp-dns3', 'dhcp-save-btn'
        ];

        function lockDhcpCard() {
            DHCP_FIELD_IDS.forEach(id => { document.getElementById(id).disabled = true; });
            document.getElementById('dhcp-toggle').classList.add('disabled-ui');
        }

        function unlockDhcpCard() {
            DHCP_FIELD_IDS.forEach(id => { document.getElementById(id).disabled = false; });
            document.getElementById('dhcp-toggle').classList.remove('disabled-ui');
        }

        // --------------------------------------------------------
        // DHCP Server card — save (settings via dhcp_save, plus
        // dhcp_enable only if the toggle actually changed)
        // --------------------------------------------------------
        function saveDhcp() {
            const poolStart = document.getElementById('dhcp-pool-start').value.trim();
            const poolEnd   = document.getElementById('dhcp-pool-end').value.trim();
            const mask      = document.getElementById('dhcp-mask').value.trim();
            const gateway   = document.getElementById('dhcp-gateway').value.trim();
            const lease     = document.getElementById('dhcp-lease').value.trim();
            const domain    = document.getElementById('dhcp-domain').value.trim();
            const dnsOpt    = document.getElementById('dhcp-dns-opt').checked ? '1' : '0';
            const dns1      = document.getElementById('dhcp-dns1').value.trim();
            const dns2      = document.getElementById('dhcp-dns2').value.trim();
            const dns3      = document.getElementById('dhcp-dns3').value.trim();

            const fieldErrs = {
                'dhcp-pool-start': validateIpField(poolStart),
                'dhcp-pool-end':   validateIpField(poolEnd),
                'dhcp-mask':       validateIpField(mask),
                'dhcp-gateway':    validateIpField(gateway),
            };
            [['dhcp-dns1', dns1], ['dhcp-dns2', dns2], ['dhcp-dns3', dns3]].forEach(([id, val]) => {
                if (val) fieldErrs[id] = validateIpField(val);
            });

            let leaseErr = null;
            if (!lease || !/^\d+$/.test(lease) || +lease <= 0) leaseErr = 'Must be a positive whole number';
            let domainErr = domain ? null : 'Required';

            Object.keys(fieldErrs).forEach(id => setIpFieldError(id, id + '-err', fieldErrs[id]));
            setIpFieldError('dhcp-lease',  'dhcp-lease-err',  leaseErr);
            setIpFieldError('dhcp-domain', 'dhcp-domain-err', domainErr);

            const hasErr = Object.values(fieldErrs).some(Boolean) || leaseErr || domainErr;
            if (hasErr) return;

            const nowEnabled = document.getElementById('dhcp-toggle').classList.contains('on');
            const enabledChanged = (nowEnabled !== loadedDhcpEnabled);

            lockDhcpCard();
            lockAll();
            if (enabledChanged) {
                startCountdown();
            } else {
                showOverlay('Applying Changes.');
            }

            const saveBody = 'pool_start=' + encodeURIComponent(poolStart)
                + '&pool_end=' + encodeURIComponent(poolEnd)
                + '&mask=' + encodeURIComponent(mask)
                + '&gateway=' + encodeURIComponent(gateway)
                + '&lease=' + encodeURIComponent(lease)
                + '&domain=' + encodeURIComponent(domain)
                + '&dns_opt=' + dnsOpt
                + '&dns1=' + encodeURIComponent(dns1)
                + '&dns2=' + encodeURIComponent(dns2)
                + '&dns3=' + encodeURIComponent(dns3);

            fetch('/cgi-bin/lme.cgi?action=dhcp_save', {
                method: 'POST',
                headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                body: saveBody
            })
            .then(r => {
                if (!r.ok) return r.text().then(t => { throw new Error(t); });
            })
            .then(() => {
                if (!enabledChanged) return null;
                return fetch('/cgi-bin/lme.cgi?action=dhcp_enable', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                    body: 'mode=' + (nowEnabled ? '1' : '0')
                }).then(r => {
                    if (!r.ok) return r.text().then(t => { throw new Error(t); });
                    return fetch('/cgi-bin/lme.cgi?action=dhcp_status').then(r2 => r2.json());
                }).then(data => {
                    if (data && data.pending) {
                        fetch('/cgi-bin/lme.cgi?action=dhcp_confirm').catch(() => {});
                    }
                });
            })
            .then(() => {
                loadedDhcpEnabled = nowEnabled;
                if (countdownTimer) { clearInterval(countdownTimer); countdownTimer = null; }
                spinner.style.display = 'none';
                overlayTxt.textContent = 'Changes Applied.';
                setTimeout(() => {
                    overlay.classList.remove('visible');
                    setTimeout(() => { unlockAll(); unlockDhcpCard(); }, 350);
                }, 1000);
            })
            .catch(err => {
                if (countdownTimer) { clearInterval(countdownTimer); countdownTimer = null; }
                overlay.classList.remove('visible');
                setTimeout(() => { unlockAll(); unlockDhcpCard(); }, 350);
                toastr['warning']('Error: ' + (err.message || 'unknown'), 'Error');
            });
        }

        // --------------------------------------------------------
        // Page init
        // --------------------------------------------------------
        window.addEventListener('DOMContentLoaded', () => {
            lockAll();
            lockIpCard();
            lockDhcpCard();
            showOverlay('Loading\u2026');

            // Fetch port status, LAN IP, and DHCP settings in parallel
            const portFetch = fetch('/cgi-bin/lme.cgi?action=lan_status')
                .then(r => r.json())
                .then(data => {
                    if (data.error) throw new Error(data.error);
                    applyStatus(data);
                    if (data.pending) {
                        fetch('/cgi-bin/lme.cgi?action=lan_confirm').catch(() => {});
                    }
                });

            const ipFetch = fetch('/cgi-bin/lme.cgi?action=lan_ip_status')
                .then(r => r.json())
                .then(data => {
                    loadedLanIp     = data.ip     || '';
                    loadedLanSubnet = data.subnet  || '';
                    document.getElementById('lan-ip').value     = loadedLanIp;
                    document.getElementById('lan-subnet').value  = loadedLanSubnet;
                });

            const dhcpFetch = fetch('/cgi-bin/lme.cgi?action=dhcp_status')
                .then(r => r.json())
                .then(data => {
                    loadedDhcpEnabled = !!data.enabled;
                    setDhcpToggle(loadedDhcpEnabled);
                    document.getElementById('dhcp-pool-start').value = data.pool_start || '';
                    document.getElementById('dhcp-pool-end').value   = data.pool_end   || '';
                    document.getElementById('dhcp-mask').value       = data.mask       || '';
                    document.getElementById('dhcp-gateway').value    = data.gateway    || '';
                    document.getElementById('dhcp-lease').value      = data.lease      || 86400;
                    document.getElementById('dhcp-domain').value     = data.domain     || '';
                    document.getElementById('dhcp-dns-opt').checked  = (data.dns_opt == 1);
                    document.getElementById('dhcp-dns1').value       = data.dns1 || '';
                    document.getElementById('dhcp-dns2').value       = data.dns2 || '';
                    document.getElementById('dhcp-dns3').value       = data.dns3 || '';
                });

            Promise.all([portFetch, ipFetch, dhcpFetch])
                .then(() => {
                    hideOverlay();
                    unlockIpCard();
                    unlockDhcpCard();
                })
                .catch(err => {
                    overlay.classList.remove('visible');
                    unlockIpCard();
                    unlockDhcpCard();
                    toastr['warning']('Error: ' + (err.message || 'failed to load'), 'Error');
                });
        });
    </script>
    <script src="/js/bootstrap.bundle.min.js?v=1.0.0"></script>
    <script src="/js/jquery-3.7.1.min.js?v=1.0.0"></script>
    <script src="/js/toastr.min.js?v=1.0.0"></script>
</body>
</html>
