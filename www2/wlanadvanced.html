<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="/css/bootstrap.min.css?v=1.0.0" rel="stylesheet">
    <link href="/css/style.css?v=1.0.0" rel="stylesheet">
    <style>
        /* ---- Toggle switch (matches other pages) ---- */
        .wlan-toggle {
            width: 46px;
            height: 26px;
            border-radius: 13px;
            background: #444;
            position: relative;
            cursor: pointer;
            transition: background 0.25s;
            flex-shrink: 0;
        }
        .wlan-toggle.on { background: #ffffff; }
        .wlan-toggle.disabled-ui { opacity: 0.4; pointer-events: none; }
        .wlan-toggle-knob {
            position: absolute;
            width: 18px;
            height: 18px;
            border-radius: 50%;
            background: #fff;
            top: 4px;
            left: 4px;
            transition: left 0.25s, background 0.25s, box-shadow 0.25s;
            box-shadow: 0 1px 4px rgba(0,0,0,0.5);
        }
        .wlan-toggle.on .wlan-toggle-knob {
            left: 24px;
            background: #555;
            box-shadow: 0 1px 4px rgba(0,0,0,0.3);
        }

        /* ---- Setting rows ---- */
        .setting-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 0;
            border-bottom: 1px solid var(--border-color, rgba(255,255,255,0.1));
        }
        .setting-row:last-of-type { border-bottom: none; }
        .setting-label  { font-size: 14px; font-weight: 500; line-height: 1.3; }
        .setting-desc   { font-size: 11px; color: var(--text-secondary, #888); margin-top: 1px; }

        /* ---- TX Beamforming reveal (shown only when MIMO is on) ---- */
        .txbf-reveal {
            overflow: hidden;
            max-height: 0;
            opacity: 0;
            /* margin-bottom is also animated so there's no gap flash when hiding */
            margin-bottom: 0 !important;
            pointer-events: none;
            transition: max-height 0.32s ease, opacity 0.25s ease, margin-bottom 0.32s ease;
        }
        .txbf-reveal.show {
            max-height: 72px;
            opacity: 1;
            margin-bottom: 0 !important; /* the inner setting-row provides spacing */
            pointer-events: auto;
        }

        /* ---- Section dividers ---- */
        .section-divider {
            border-top: 1px solid var(--border-color, rgba(255,255,255,0.1));
            margin: 4px 0 0;
        }

        /* ---- Rate limit input group ---- */
        .rate-input .input-group-text {
            font-size: 12px;
            min-width: 46px;
            justify-content: center;
        }

        /* ---- Band selector (matches wlanbasic.html / wlansecurity.html) ---- */
        #band-bar {
            display: flex; align-items: center; gap: 10px;
            margin-bottom: 14px;
        }
        #band-bar label {
            font-size: 11px; color: var(--text-secondary, #888);
            text-transform: uppercase; letter-spacing: 0.08em;
            white-space: nowrap;
        }
        #band-select-main {
            width: 140px;
        }

        /* ---- Fixed TX Rate reveal (shown only when Rate Adaptive is off) ---- */
        .ratefix-reveal {
            overflow: hidden;
            max-height: 0;
            opacity: 0;
            margin-bottom: 0 !important;
            pointer-events: none;
            transition: max-height 0.32s ease, opacity 0.25s ease, margin-bottom 0.32s ease;
        }
        .ratefix-reveal.show {
            max-height: 90px;
            opacity: 1;
            margin-bottom: 0 !important;
            pointer-events: auto;
        }

        /* ---- Interface type/name badge (matches wlansecurity.html) ---- */
        .mode-badge {
            font-size: 10px; padding: 2px 7px;
            border-radius: 3px; font-weight: 700;
            letter-spacing: 0.06em; text-transform: uppercase;
            white-space: nowrap; flex-shrink: 0;
        }
        .mode-badge.ap  { background: rgba(255,255,255,0.10); color: #c8c8c8; }
        .mode-badge.vap { background: rgba(120,200,120,0.13); color: #7ac87a; }
        .mode-badge.vxd { background: rgba(80,180,255,0.13);  color: #64b4ff; }

        /* ---- Note text under a control ---- */
        .field-note {
            font-size: 11px;
            color: var(--text-secondary, #888);
            margin-top: 4px;
        }

        /* ---- Collapsible cards ---- */
        .card-header.collapsible { cursor: pointer; }
        .card-chevron {
            width: 8px; height: 8px;
            border-right: 2px solid var(--text-secondary);
            border-bottom: 2px solid var(--text-secondary);
            transform: rotate(45deg);
            transition: transform 0.2s; flex-shrink: 0;
        }
        .card.collapsed .card-chevron { transform: rotate(-45deg); }
        .card .card-body {
            overflow: hidden;
            max-height: 1500px;
            transition: max-height 0.3s ease, opacity 0.25s ease,
                        padding-top 0.3s ease, padding-bottom 0.3s ease;
        }
        .card.collapsed .card-body {
            max-height: 0;
            opacity: 0;
            padding-top: 0 !important;
            padding-bottom: 0 !important;
        }
    </style>
    <link href="/css/toastr.min.css?v=1.0.0" rel="stylesheet">
</head>
<body>
    <!-- Full-page overlay -->
    <div id="overlay">
        <div id="overlay-blur"></div>
        <div id="overlay-msg">
            <div id="overlay-spinner"></div>
            <span id="overlay-text"></span>
        </div>
    </div>

    <script src="/js/nav.js?v=1.0.0"></script>

    <div class="container mt-4" style="max-width:520px;">

        <!-- Band selector (switches between the 2.4GHz and 5GHz radios) -->
        <div id="band-bar">
            <label for="band-select-main">Band</label>
            <select class="form-select" id="band-select-main" onchange="switchBand()">
                <option value="24">2.4 GHz</option>
                <option value="5">5 GHz</option>
            </select>
        </div>

        <!-- Iface cards injected here (Main AP, VAPs, VXD) -->
        <div id="ifaces-container"></div>

    </div>

    <script>
        const CGI        = '/cgi-bin/wlanadvanced.cgi';
        const overlay    = document.getElementById('overlay');
        const overlayTxt = document.getElementById('overlay-text');
        const spinner    = document.getElementById('overlay-spinner');

        // fixedTxRate encoding (11ac, 5GHz only): base + (NSS-1)*10 + MCS
        // NSS1 MCS0-9 -> 2147483648-2147483657, NSS2 MCS0-9 -> 2147483658-2147483667
        const FIXEDRATE_BASE = 2147483648;
        function encodeFixedRate(nss, mcs) {
            return FIXEDRATE_BASE + (nss - 1) * 10 + mcs;
        }
        function decodeFixedRate(val) {
            const offset = val - FIXEDRATE_BASE;
            if (offset < 0 || offset > 19) return null;
            return { nss: Math.floor(offset / 10) + 1, mcs: offset % 10 };
        }

        let countdownTimer  = null;
        let secondsLeft     = 90;
        let currentBand     = 24;   // 24 = 2.4GHz (wlan1), 5 = 5GHz (wlan0)
        let currentStatus   = null; // last-loaded {band, wlan_if, shortgi, ifaces[]}

        // --------------------------------------------------------
        // Toggle helpers
        // --------------------------------------------------------
        function isOn(id) {
            return document.getElementById(id).classList.contains('on');
        }

        function setToggle(id, on) {
            const el = document.getElementById(id);
            if (!el) return;
            el.classList.toggle('on', !!on);
            el.setAttribute('aria-checked', on ? 'true' : 'false');
        }

        /** Generic toggle for simple binary switches. */
        function localToggle(id) {
            const el = document.getElementById(id);
            const nowOn = el.classList.toggle('on');
            el.setAttribute('aria-checked', nowOn ? 'true' : 'false');
        }

        /** Collapse / expand a card via its header. */
        function toggleCard(headerEl) {
            const card = headerEl.closest('.card');
            if (card) card.classList.toggle('collapsed');
        }

        /** Toggle MIMO on card `id` and show/hide its txbf row accordingly. */
        function toggleMimo(id) {
            const mimoEl = document.getElementById(id + '-mimo-toggle');
            const nowOn = mimoEl.classList.toggle('on');
            mimoEl.setAttribute('aria-checked', nowOn ? 'true' : 'false');
            applyTxbfVisibility(id, nowOn);
        }

        /** Show/hide a card's TX Beamforming row based on its MIMO state. */
        function applyTxbfVisibility(id, mimoOn) {
            const revealEl = document.getElementById(id + '-txbf-reveal');
            if (mimoOn) {
                revealEl.classList.add('show');
            } else {
                revealEl.classList.remove('show');
                // Force txbf off whenever MIMO is disabled
                setToggle(id + '-txbf-toggle', false);
            }
        }

        /** Toggle Rate Adaptive on card `id` and show/hide its fixed-rate row. */
        function toggleRateAdapt(id) {
            const el = document.getElementById(id + '-rateadapt-toggle');
            const nowOn = el.classList.toggle('on');
            el.setAttribute('aria-checked', nowOn ? 'true' : 'false');
            applyRateFixVisibility(id, !nowOn);
        }

        /** Show/hide a card's Fixed Rate (NSS/MCS) controls; only usable on 5GHz. */
        function applyRateFixVisibility(id, showFixed) {
            const revealEl = document.getElementById(id + '-ratefix-reveal');
            if (showFixed && currentBand === 5) {
                revealEl.classList.add('show');
            } else {
                revealEl.classList.remove('show');
            }
        }

        /** 2.4GHz has no validated Fixed-Rate MCS mapping yet — force Auto-only there. */
        function updateBandGatingForCard(id) {
            const is5g = currentBand === 5;
            const noteEl = document.getElementById(id + '-ratefix-note');
            if (!is5g) {
                setToggle(id + '-rateadapt-toggle', true);
                applyRateFixVisibility(id, false);
                noteEl.textContent = '11ac fixed rate is only available on 5GHz.';
            } else {
                noteEl.textContent = '11ac fixed rate (5GHz only)';
            }
            document.getElementById(id + '-rateadapt-toggle').classList.toggle('disabled-ui', !is5g);
        }

        function updateAllBandGating() {
            if (!currentStatus) return;
            currentStatus.ifaces.forEach(iface => updateBandGatingForCard('adv-' + iface.idx));
        }

        // --------------------------------------------------------
        // Band switching
        // --------------------------------------------------------
        function switchBand() {
            currentBand = parseInt(document.getElementById('band-select-main').value, 10) || 24;
            loadStatus();
        }

        // --------------------------------------------------------
        // Form enable / disable (everything inside the dynamic cards)
        // --------------------------------------------------------
        function setFormEnabled(enabled) {
            const bandSel = document.getElementById('band-select-main');
            if (bandSel) bandSel.disabled = !enabled;
            document.querySelectorAll(
                '#ifaces-container input, #ifaces-container select, #ifaces-container button'
            ).forEach(el => { el.disabled = !enabled; });
            document.querySelectorAll('#ifaces-container .wlan-toggle')
                .forEach(el => el.classList.toggle('disabled-ui', !enabled));
        }

        // --------------------------------------------------------
        // Overlay helpers
        // --------------------------------------------------------
        function showOverlay(text) {
            overlayTxt.textContent = text;
            spinner.style.display = 'block';
            overlay.classList.add('visible');
        }

        function hideOverlay() {
            overlay.classList.remove('visible');
            if (countdownTimer) { clearInterval(countdownTimer); countdownTimer = null; }
        }

        function startCountdown() {
            secondsLeft = 90;
            showOverlay('Applying Changes. ' + secondsLeft + 's');
            countdownTimer = setInterval(() => {
                secondsLeft--;
                if (secondsLeft > 0) {
                    overlayTxt.textContent = 'Applying Changes. ' + secondsLeft + 's';
                } else {
                    clearInterval(countdownTimer);
                    countdownTimer = null;
                    overlayTxt.textContent = 'Reverting Changes.';
                }
            }, 1000);
        }

        // --------------------------------------------------------
        // Interface naming / labels
        // --------------------------------------------------------
        function vifName(idx, type) {
            const base = currentBand === 5 ? 'wlan0' : 'wlan1';
            if (idx === 0) return base;
            if (type === 'vxd') return base + '-vxd';
            return base + '-vap' + (idx - 1);
        }

        function ifaceLabel(iface) {
            if (iface.type === 'ap')  return 'Main AP';
            if (iface.type === 'vxd') return 'VXD — Repeater / Client';
            return 'VAP ' + iface.idx;
        }

        // --------------------------------------------------------
        // Build one card per interface (idx 0-5)
        // --------------------------------------------------------
        function buildIfaceCards(ifaces) {
            const container = document.getElementById('ifaces-container');
            container.innerHTML = '';

            ifaces.forEach(iface => {
                const id = 'adv-' + iface.idx;
                const isMainAp = iface.idx === 0;

                const sgiBlock = !isMainAp ? '' : `
                    <div class="setting-row">
                        <div>
                            <div class="setting-label">Short Guard Interval</div>
                            <div class="setting-desc">Improves throughput; may increase sensitivity to multipath (applies to the whole radio)</div>
                        </div>
                        <div id="${id}-sgi-toggle" class="wlan-toggle"
                             onclick="localToggle('${id}-sgi-toggle')" role="switch" aria-checked="false"
                             title="Toggle Short GI">
                            <div class="wlan-toggle-knob"></div>
                        </div>
                    </div>
                    <div class="section-divider mb-0"></div>`;

                const div = document.createElement('div');
                div.className = 'card mb-3 collapsed';
                div.id = 'card-' + id;

                div.innerHTML = `
                    <div class="card-header collapsible d-flex align-items-center gap-2" style="flex-wrap:wrap; row-gap:4px;"
                         onclick="toggleCard(this)">
                        <span class="card-chevron"></span>
                        <span style="font-size:12px; white-space:nowrap;">${ifaceLabel(iface)}</span>
                        <span class="mode-badge ${iface.type}">${vifName(iface.idx, iface.type)}</span>
                    </div>
                    <div class="card-body pb-2">

                        <!-- MIMO -->
                        <div class="setting-row">
                            <div>
                                <div class="setting-label">MIMO</div>
                                <div class="setting-desc">Multi-user MIMO (MU-MIMO)</div>
                            </div>
                            <div id="${id}-mimo-toggle" class="wlan-toggle"
                                 onclick="toggleMimo('${id}')" role="switch" aria-checked="false"
                                 title="Toggle MIMO">
                                <div class="wlan-toggle-knob"></div>
                            </div>
                        </div>

                        <!-- TX Beamforming — revealed only when MIMO is on -->
                        <div id="${id}-txbf-reveal" class="txbf-reveal">
                            <div class="setting-row">
                                <div>
                                    <div class="setting-label">TX Beamforming</div>
                                    <div class="setting-desc">Steers signal toward clients (requires MIMO)</div>
                                </div>
                                <div id="${id}-txbf-toggle" class="wlan-toggle"
                                     onclick="localToggle('${id}-txbf-toggle')" role="switch" aria-checked="false"
                                     title="Toggle TX Beamforming">
                                    <div class="wlan-toggle-knob"></div>
                                </div>
                            </div>
                        </div>

                        <div class="section-divider mt-1 mb-0"></div>

                        ${sgiBlock}

                        <!-- Multicast to Unicast -->
                        <div class="setting-row">
                            <div>
                                <div class="setting-label">Multicast to Unicast</div>
                                <div class="setting-desc">Converts multicast to per-client unicast for reliability</div>
                            </div>
                            <div id="${id}-mc2u-toggle" class="wlan-toggle"
                                 onclick="localToggle('${id}-mc2u-toggle')" role="switch" aria-checked="false"
                                 title="Toggle multicast to unicast">
                                <div class="wlan-toggle-knob"></div>
                            </div>
                        </div>

                        <div class="section-divider mb-0"></div>

                        <!-- Security -->
                        <div class="setting-row">
                            <div>
                                <div class="setting-label">Protected Management Frames</div>
                                <div class="setting-desc">Protects against deauth/disassoc attacks (802.11w)</div>
                            </div>
                            <select id="${id}-pmf-sel" class="form-select form-select-sm"
                                    style="max-width:130px;flex-shrink:0;">
                                <option value="0">Disabled</option>
                                <option value="1">Capable</option>
                                <option value="2">Required</option>
                            </select>
                        </div>

                        <div class="setting-row">
                            <div>
                                <div class="setting-label">SHA-256 Key Derivation</div>
                                <div class="setting-desc">Enhanced key management; recommended with PMF</div>
                            </div>
                            <div id="${id}-sha256-toggle" class="wlan-toggle"
                                 onclick="localToggle('${id}-sha256-toggle')" role="switch" aria-checked="false"
                                 title="Toggle SHA-256">
                                <div class="wlan-toggle-knob"></div>
                            </div>
                        </div>

                        <div class="section-divider mb-0"></div>

                        <!-- Rate Limits -->
                        <div class="setting-row">
                            <div style="flex:1;margin-right:12px;">
                                <div class="setting-label mb-1">TX Rate Limit</div>
                                <div class="input-group input-group-sm rate-input">
                                    <input type="number" class="form-control" id="${id}-tx-restrict"
                                           min="0" max="1000" value="0" placeholder="0">
                                    <span class="input-group-text">Mbps</span>
                                </div>
                                <div class="setting-desc mt-1">0 = no limit</div>
                            </div>
                            <div style="flex:1;">
                                <div class="setting-label mb-1">RX Rate Limit</div>
                                <div class="input-group input-group-sm rate-input">
                                    <input type="number" class="form-control" id="${id}-rx-restrict"
                                           min="0" max="1000" value="0" placeholder="0">
                                    <span class="input-group-text">Mbps</span>
                                </div>
                                <div class="setting-desc mt-1">0 = no limit</div>
                            </div>
                        </div>

                        <div class="section-divider mb-0"></div>

                        <!-- TX Rate -->
                        <div class="setting-row">
                            <div>
                                <div class="setting-label">Rate Adaptive</div>
                                <div class="setting-desc">Auto-selects transmit rate; disable to fix a single rate</div>
                            </div>
                            <div id="${id}-rateadapt-toggle" class="wlan-toggle"
                                 onclick="toggleRateAdapt('${id}')" role="switch" aria-checked="true"
                                 title="Toggle Rate Adaptive">
                                <div class="wlan-toggle-knob"></div>
                            </div>
                        </div>

                        <div id="${id}-ratefix-reveal" class="ratefix-reveal">
                            <div class="setting-row" style="align-items:flex-start;">
                                <div style="flex:1;margin-right:8px;">
                                    <div class="setting-label mb-1">Spatial Streams</div>
                                    <select id="${id}-ratefix-nss" class="form-select form-select-sm">
                                        <option value="1">1 (NSS1)</option>
                                        <option value="2">2 (NSS2)</option>
                                    </select>
                                </div>
                                <div style="flex:1;">
                                    <div class="setting-label mb-1">MCS Index</div>
                                    <select id="${id}-ratefix-mcs" class="form-select form-select-sm">
                                        <option value="0">MCS 0</option>
                                        <option value="1">MCS 1</option>
                                        <option value="2">MCS 2</option>
                                        <option value="3">MCS 3</option>
                                        <option value="4">MCS 4</option>
                                        <option value="5">MCS 5</option>
                                        <option value="6">MCS 6</option>
                                        <option value="7">MCS 7</option>
                                        <option value="8">MCS 8</option>
                                        <option value="9">MCS 9</option>
                                    </select>
                                </div>
                            </div>
                            <div class="field-note" id="${id}-ratefix-note">11ac fixed rate (5GHz only)</div>
                        </div>

                        <div class="mt-3">
                            <button type="button" class="btn btn-primary w-100"
                                    onclick="saveAdvanced(${iface.idx})">Save</button>
                        </div>

                    </div>`;

                container.appendChild(div);

                // Populate values
                setToggle(id + '-mimo-toggle',   iface.mimo   == 1);
                setToggle(id + '-txbf-toggle',   iface.txbf   == 1);
                // mc2u_disable=0 means the feature is ON — invert for the toggle
                setToggle(id + '-mc2u-toggle',   iface.mc2u_disable == 0);
                setToggle(id + '-sha256-toggle', iface.sha256 == 1);
                if (isMainAp) setToggle(id + '-sgi-toggle', currentStatus.shortgi == 1);

                document.getElementById(id + '-pmf-sel').value     = String(iface.pmf);
                document.getElementById(id + '-tx-restrict').value = iface.tx_restrict;
                document.getElementById(id + '-rx-restrict').value = iface.rx_restrict;

                applyTxbfVisibility(id, iface.mimo == 1);

                const rateAdaptive = iface.rate_adaptive == 1;
                setToggle(id + '-rateadapt-toggle', rateAdaptive);
                const decoded = decodeFixedRate(parseInt(iface.fixed_rate, 10) || 0);
                if (decoded) {
                    document.getElementById(id + '-ratefix-nss').value = String(decoded.nss);
                    document.getElementById(id + '-ratefix-mcs').value = String(decoded.mcs);
                }
                applyRateFixVisibility(id, !rateAdaptive);
                updateBandGatingForCard(id);
            });
        }

        // --------------------------------------------------------
        // Load status
        // --------------------------------------------------------
        function loadStatus() {
            setFormEnabled(false);
            showOverlay('Loading ' + (currentBand === 24 ? '2.4 GHz' : '5 GHz') + '…');
            fetch(CGI + '?band=' + currentBand + '&action=adv_status')
                .then(r => { if (!r.ok) throw new Error('HTTP ' + r.status); return r.json(); })
                .then(status => {
                    currentStatus = status;
                    buildIfaceCards(status.ifaces);
                    if (status.pending) {
                        fetch(CGI + '?band=' + currentBand + '&action=adv_confirm').catch(() => {});
                    }
                    setFormEnabled(true);
                    updateAllBandGating();
                    hideOverlay();
                })
                .catch(err => {
                    hideOverlay();
                    toastr["warning"]('Could not load advanced WiFi settings: ' + (err.message || err), "Error");
                });
        }

        // --------------------------------------------------------
        // Poll until the device is back after restart
        // --------------------------------------------------------
        function pollUntilBack(retries) {
            retries = (retries === undefined) ? 25 : retries;
            fetch(CGI + '?band=' + currentBand + '&action=adv_status')
                .then(r => { if (!r.ok) throw new Error('HTTP ' + r.status); return r.json(); })
                .then(status => {
                    currentStatus = status;
                    buildIfaceCards(status.ifaces);
                    if (status.pending) {
                        fetch(CGI + '?band=' + currentBand + '&action=adv_confirm').catch(() => {});
                    }
                    if (countdownTimer) { clearInterval(countdownTimer); countdownTimer = null; }
                    spinner.style.display = 'none';
                    overlayTxt.textContent = 'Changes Applied.';
                    setFormEnabled(true);
                    updateAllBandGating();
                    setTimeout(hideOverlay, 1200);
                })
                .catch(err => {
                    if (retries > 0) {
                        setTimeout(() => pollUntilBack(retries - 1), 2000);
                    } else {
                        hideOverlay();
                        toastr["warning"]('Network error after apply: ' + (err.message || err), "Error");
                    }
                });
        }

        // --------------------------------------------------------
        // Save one interface's advanced settings
        // --------------------------------------------------------
        function saveAdvanced(idx) {
            const id    = 'adv-' + idx;
            const mimoOn   = isOn(id + '-mimo-toggle');
            // txbf is only meaningful (and visible) when MIMO is on; force 0 otherwise
            const txbfOn   = mimoOn && isOn(id + '-txbf-toggle');
            // mc2u_disable is inverted: toggle ON → mc2u_disable=0 (feature enabled)
            const mc2uDis  = isOn(id + '-mc2u-toggle') ? 0 : 1;
            const sha256On = isOn(id + '-sha256-toggle');
            const pmf      = document.getElementById(id + '-pmf-sel').value;
            let   txr      = parseInt(document.getElementById(id + '-tx-restrict').value, 10);
            let   rxr      = parseInt(document.getElementById(id + '-rx-restrict').value, 10);
            if (isNaN(txr) || txr < 0) txr = 0;
            if (isNaN(rxr) || rxr < 0) rxr = 0;

            // Rate Adaptive / Fixed Rate — Fixed is only ever sent on 5GHz;
            // the CGI also enforces this and falls back to auto otherwise.
            const rateAdaptOn = isOn(id + '-rateadapt-toggle') || currentBand !== 5;
            let   fixedRate   = 0;
            if (!rateAdaptOn) {
                const nss = parseInt(document.getElementById(id + '-ratefix-nss').value, 10) || 1;
                const mcs = parseInt(document.getElementById(id + '-ratefix-mcs').value, 10) || 0;
                fixedRate = encodeFixedRate(nss, mcs);
            }

            let body = 'mimo='          + (mimoOn   ? 1 : 0)
                     + '&txbf='         + (txbfOn   ? 1 : 0)
                     + '&mc2u_disable=' + mc2uDis
                     + '&sha256='       + (sha256On ? 1 : 0)
                     + '&pmf='          + encodeURIComponent(pmf)
                     + '&tx_restrict='  + txr
                     + '&rx_restrict='  + rxr
                     + '&rate_adaptive='+ (rateAdaptOn ? 1 : 0)
                     + '&fixed_rate='   + fixedRate;

            // Short Guard Interval only exists on the Main AP (idx 0) card —
            // it's a radio-wide setting with no per-interface variant.
            if (idx === 0) {
                body += '&shortgi=' + (isOn(id + '-sgi-toggle') ? 1 : 0);
            }

            const iface   = currentStatus?.ifaces?.find(i => i.idx === idx);
            const ifaceOn = (iface?.disabled ?? 1) === 0;
            const postUrl = CGI + '?band=' + currentBand + '&idx=' + idx;

            setFormEnabled(false);

            if (!ifaceOn) {
                // Interface is off — quick save, no restart
                showOverlay('Saving.');
                fetch(postUrl, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                    body: body
                })
                .then(r => { if (!r.ok) throw new Error('HTTP ' + r.status); })
                .then(() => fetch(CGI + '?band=' + currentBand + '&action=adv_status')
                    .then(r => { if (!r.ok) throw new Error('HTTP ' + r.status); return r.json(); }))
                .then(status => { currentStatus = status; buildIfaceCards(status.ifaces); })
                .then(() => {
                    spinner.style.display = 'none';
                    overlayTxt.textContent = 'Settings Saved.';
                    setFormEnabled(true);
                    updateAllBandGating();
                    setTimeout(hideOverlay, 900);
                })
                .catch(err => {
                    hideOverlay();
                    toastr["warning"]('Save error: ' + (err.message || err), "Error");
                });

            } else {
                // Interface is live — needs wlan_apply, use countdown + poll-until-back
                startCountdown();
                fetch(postUrl, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                    body: body
                }).catch(() => {});
                setTimeout(() => pollUntilBack(), 4000);
            }
        }

        // --------------------------------------------------------
        // Init
        // --------------------------------------------------------
        window.addEventListener('DOMContentLoaded', () => {
            document.getElementById('band-select-main').value = String(currentBand);
            setFormEnabled(false); // Disable until data is loaded
            loadStatus();
        });
    </script>
    <script src="/js/bootstrap.bundle.min.js?v=1.0.0"></script>
    <script src="/js/jquery-3.7.1.min.js?v=1.0.0"></script>
    <script src="/js/toastr.min.js?v=1.0.0"></script>
</body>
</html>
