<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="/css/bootstrap.min.css?v=1.0.0" rel="stylesheet">
    <link href="/css/toastr.min.css?v=1.0.0" rel="stylesheet">
    <link href="/css/style.css?v=1.0.0" rel="stylesheet">
    <style>
        .acl-note {
            font-size: 12px;
            color: var(--text-secondary);
            margin: 0;
            padding: 10px 16px;
            border-bottom: 1px solid var(--border-color);
        }
        .acl-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 13px;
        }
        .acl-table td {
            padding: 10px 16px;
            border-bottom: 1px solid rgba(255,255,255,.04);
            vertical-align: middle;
        }
        .acl-table tbody tr:last-child td { border-bottom: none; }
        .acl-svc-name { font-weight: 500; color: var(--text-primary); }
        .acl-port { color: var(--text-secondary); font-size: 11px; margin-top: 2px; }
        .acl-actions { display: flex; gap: 6px; align-items: center; }
        .acl-actions select { flex: 1; min-width: 0; }
        .acl-row-saving { opacity: 0.5; pointer-events: none; }
        .daemon-badge {
            display: inline-block; margin-left: 6px;
            font-size: 10px; font-weight: 700; letter-spacing: 0.04em;
            padding: 1px 6px; border-radius: 10px; text-transform: uppercase;
        }
        .daemon-badge.up   { background: rgba(76,175,80,.18);  color: #81c784; }
        .daemon-badge.down { background: rgba(255,255,255,.08); color: var(--text-secondary); }
        .acl-port-edit { display: flex; align-items: center; gap: 5px; margin-top: 4px; }
        .acl-port-edit input {
            width: 72px; font-size: 12px; padding: 1px 6px;
            background: var(--bg-input); color: var(--text-primary);
            border: 1px solid var(--border-color); border-radius: 4px;
        }
        @media (max-width: 575px) {
            .acl-table, .acl-table tbody, .acl-table tr, .acl-table td {
                display: block;
                width: 100%;
            }
            .acl-table tr {
                padding: 10px 12px;
                border-bottom: 1px solid rgba(255,255,255,.04);
            }
            .acl-table tbody tr:last-child { border-bottom: none; }
            .acl-table td { padding: 2px 0; border: none; }
            .acl-table td:first-child { padding-bottom: 6px; }
            .acl-actions { flex-wrap: nowrap; }
        }
    </style>
</head>
<body>
    <div id="overlay">
        <div id="overlay-blur"></div>
        <div id="overlay-msg">
            <div id="overlay-spinner"></div>
            <span id="overlay-text"></span>
        </div>
    </div>

    <script>document.write('<script src="/js/nav.js?t=' + Date.now() + '"><\/script>');</script>

    <div class="container mt-4">
        <div class="card">
            <div class="card-header">IP Access Control</div>
            <div class="card-body p-0">
                <table class="acl-table" id="acl-table">
                    <tbody id="acl-tbody">
                        <!-- rows populated by JS -->
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        const overlay    = document.getElementById('overlay');
        const overlayTxt = document.getElementById('overlay-text');
        const spinner    = document.getElementById('overlay-spinner');
        const tbody      = document.getElementById('acl-tbody');

        const LEVELS = [
            { value: 0, label: 'Blocked'   },
            { value: 1, label: 'WAN only'  },
            { value: 2, label: 'LAN only'  },
            { value: 3, label: 'WAN + LAN' },
        ];

        function showOverlay(text) {
            overlayTxt.textContent = text;
            spinner.style.display = 'block';
            overlay.classList.add('visible');
        }
        function hideOverlay() { overlay.classList.remove('visible'); }

        function daemonBadgeHtml(svc) {
            if (svc.service !== 'ssh' || typeof svc.daemonRunning === 'undefined') return '';
            return svc.daemonRunning
                ? '<span class="daemon-badge up">running</span>'
                : '<span class="daemon-badge down">stopped</span>';
        }

        function portCellHtml(svc) {
            if (svc.service !== 'ssh') {
                return `<div class="acl-port">${svc.proto}/${svc.port}</div>`;
            }
            return `
                <div class="acl-port-edit">
                    <span class="acl-port">${svc.proto}/</span>
                    <input type="number" min="1" max="65535"
                           id="acl-port-input-ssh" value="${svc.port}">
                    <button type="button" class="btn btn-outline-secondary btn-sm"
                            onclick="savePort('ssh')">Apply</button>
                </div>`;
        }

        function renderRows(services) {
            tbody.innerHTML = services.map(svc => {
                const options = LEVELS.map(l =>
                    `<option value="${l.value}"${l.value === svc.level ? ' selected' : ''}>${l.label}</option>`
                ).join('');
                return `
                    <tr id="acl-row-${svc.service}" data-service="${svc.service}">
                        <td>
                            <div class="acl-svc-name">${svc.label}${daemonBadgeHtml(svc)}</div>
                            ${portCellHtml(svc)}
                        </td>
                        <td>
                            <div class="acl-actions">
                                <select class="form-select form-select-sm" id="acl-select-${svc.service}">
                                    ${options}
                                </select>
                                <button type="button" class="btn btn-primary btn-sm"
                                        onclick="saveRow('${svc.service}')">Save</button>
                            </div>
                        </td>
                    </tr>`;
            }).join('');
        }

        function updateDaemonBadge(service, running) {
            const row = document.getElementById('acl-row-' + service);
            if (!row) return;
            const cell = row.querySelector('td');
            const existing = cell.querySelector('.daemon-badge');
            const html = running
                ? '<span class="daemon-badge up">running</span>'
                : '<span class="daemon-badge down">stopped</span>';
            if (existing) existing.outerHTML = html;
        }

        function saveRow(service) {
            const row    = document.getElementById('acl-row-' + service);
            const select = document.getElementById('acl-select-' + service);
            const level  = parseInt(select.value, 10);

            row.classList.add('acl-row-saving');
            showOverlay('Applying…');

            fetch('/cgi-bin/ipacl.cgi?action=set', {
                method: 'POST',
                headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                body: 'service=' + encodeURIComponent(service) + '&level=' + level
            })
                .then(r => { if (!r.ok) throw new Error(); return r.json(); })
                .then(data => {
                    if (!data.ok) throw new Error();
                    hideOverlay();
                    row.classList.remove('acl-row-saving');
                    if (typeof data.daemonRunning !== 'undefined') {
                        updateDaemonBadge(service, data.daemonRunning);
                    }
                    toastr.success(service + ' access level updated', 'Saved');
                })
                .catch(() => {
                    hideOverlay();
                    row.classList.remove('acl-row-saving');
                    toastr.error('Could not update ' + service, 'Error');
                });
        }

        function savePort(service) {
            const row   = document.getElementById('acl-row-' + service);
            const input = document.getElementById('acl-port-input-' + service);
            const port  = parseInt(input.value, 10);

            if (!Number.isInteger(port) || port < 1 || port > 65535) {
                toastr.error('Port must be 1–65535', 'Error');
                return;
            }

            row.classList.add('acl-row-saving');
            showOverlay('Applying new port…');

            fetch('/cgi-bin/ipacl.cgi?action=set_port', {
                method: 'POST',
                headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                body: 'service=' + encodeURIComponent(service) + '&port=' + port
            })
                .then(r => r.json().then(data => ({ ok: r.ok, data })))
                .then(({ ok, data }) => {
                    hideOverlay();
                    row.classList.remove('acl-row-saving');
                    if (!ok || !data.ok) throw new Error();
                    if (typeof data.daemonRunning !== 'undefined') {
                        updateDaemonBadge(service, data.daemonRunning);
                    }
                    toastr.success('SSH port set to ' + data.port, 'Saved');
                })
                .catch(() => {
                    hideOverlay();
                    row.classList.remove('acl-row-saving');
                    toastr.error('Could not update SSH port', 'Error');
                });
        }

        function loadList() {
            showOverlay('Loading…');
            fetch('/cgi-bin/ipacl.cgi?action=list', { cache: 'no-store' })
                .then(r => r.json())
                .then(data => {
                    renderRows(data.services || []);
                    hideOverlay();
                })
                .catch(() => {
                    hideOverlay();
                    toastr.error('Could not load access control settings', 'Error');
                });
        }

        window.addEventListener('DOMContentLoaded', loadList);
    </script>
    <script src="/js/jquery-3.7.1.min.js?v=1.0.0"></script>
    <script src="/js/bootstrap.bundle.min.js?v=1.0.0"></script>
    <script src="/js/toastr.min.js?v=1.0.0"></script>
</body>
</html>
